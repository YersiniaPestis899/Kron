# fly.toml app configuration file generated for kron-news on 2026-03-30T01:10:07+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kron-news'
primary_region = 'nrt'

[build]

[env]
  DB_PATH = '/data/kron.db'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'kron_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
